<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css"> 
    <title>Pomodoro</title>
</head>


<body>
    <div class="background">
        <div class="titleBar">
            <div class="title">
                <button class="btn_changeTheme" id="changeTheme">☺</button>
                <h4>POMODORO</h4> 
            </div>

            <div class="buttons">
                <button class="btn_minimize" id="btn_minimize">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                        <rect x="2" y="2" width="28" height="28" rx="8" fill="#FFDDC5" stroke="currentColor" stroke-width="3"/>
                        <rect x="8" y="20" width="16" height="4" fill="currentColor"/>
                    </svg>
                </button>
                <button class="btn_exit" id="btn_exit">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
                        <rect x="2" y="2" width="28" height="28" rx="8" fill="#FFDDC5" stroke="currentColor" stroke-width="3"/>
                        <path d="M10 10L22 22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                        <path d="M22 10L10 22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>


        <div class="container">
            <button class="btn_music" id="btnMusic">♬</button>
            <button class="btn_arrowLeft" id="btnArrowLeft"> 
                <svg width="45" height="45" viewBox="0 0 64 64" fill="none">
                    <polygon 
                        points="44,10 12,32 44,54" 
                        fill="currentColor" 
                        stroke="#A95A52" 
                        stroke-width="4" 
                        stroke-linejoin="round"/>
                </svg>
            </button>

            <div class="content">
                <div class="timerContainer"> 
                    <img src="../static/img/tomato.png" alt="Tomato Icon" class="tomatoIcon">

                    <div class="timer">
                        <h1 id="display"></h1>
                        <div class="line"></div>
                    </div>
                </div>

                <h4 class="phrases" id="phrases"> BORA ESTUDAR </h4>

                <button class="btn_timer" id="btnTimer">INICIAR</button>
            </div>

            <button class="btn_arrowRight" id="btnArrowRight"> 
                <svg width="45" height="45" viewBox="0 0 64 64" fill="none">
                    <polygon 
                        points="20,10 52,32 20,54" 
                        fill="currentColor" 
                        stroke="#A95A52" 
                        stroke-width="4" 
                        stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>
    <script src="../static/js/buttons.js"></script>
    <script src="../static/js/timer.js"></script>
</body>
</html>
